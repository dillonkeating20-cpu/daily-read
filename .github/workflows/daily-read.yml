name: Daily Read Newsletter

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic feedparser

      - name: Generate newsletter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_newsletter.py

      - name: Commit and push
        run: |
          git config --global user.name "Daily Read Bot"
          git config --global user.email "daily-read-bot@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || (git commit -m "Daily Read: $(date -u +'%B %d, %Y')" && git push)
